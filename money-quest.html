const COIN_CORRECT = 10;
const COIN_LEARN = 3;
const STREAK_BONUS = 5;
const JAR_MAX = 420;

// ---------- STYLES ----------
const css = `

const C = {
  sky: "#EAF4FE",
  ink: "#1E3A5F",
  inkSoft: "#5A7290",
  sunny: "#FFC83D",
  sunnyDark: "#E0A714",
  berry: "#FF6B6B",
  leaf: "#2FB873",
  leafDark: "#1F8A55",

  line: "#D7E6F5",
};

// ---------- SMALL COMPONENTS ----------
function Awning() {
  const stripes = Array.from({ length: 12 });
  return (
    <div className="flex w-full overflow-hidden" style={{ height: 18 }}>
      {stripes.map((_, i) => (
        <div key={i} className="flex-1" style={{ background: i % 2 === 0 ? C.berry : "#FFF6F6", borderBottomLeftRadius: 9, borderBottomRightRadius: 9, marginRight: 2 }} />
      ))}
    </div>
  );
}

function Jar({ coins }) {
  const pct = Math.min(coins / JAR_MAX, 1);
  const fillH = 8 + pct * 50;
  return (
    <svg width="56" height="70" viewBox="0 0 56 70" aria-label={`Coin jar, ${coins} coins`}>
      <rect x="14" y="2" width="28" height="7" rx="2.5" fill={C.inkSoft} />
      <path d="M10 12 h36 v44 a12 12 0 0 1 -12 12 h-12 a12 12 0 0 1 -12 -12 z" fill="#FFFFFF" stroke={C.line} strokeWidth="2" />
      <clipPath id="jarclip">
        <path d="M12 13 h32 v42 a11 11 0 0 1 -11 11 h-10 a11 11 0 0 1 -11 -11 z" />
      </clipPath>
      <g clipPath="url(#jarclip)">
        <rect className="mq-jarfill" x="10" y={66 - fillH} width="36" height={fillH} fill={C.sunny} />
        <circle cx="22" cy={64 - fillH} r="4" fill={C.sunnyDark} opacity={pct > 0.05 ? 1 : 0} />
        <circle cx="34" cy={66 - fillH} r="4" fill={C.sunnyDark} opacity={pct > 0.12 ? 1 : 0} />
      </g>
    </svg>
  );
}

function CoinBurst({ amount, burstKey }) {
  if (!amount) return null;
  return (
    <span key={burstKey} className="mq-float mq-display absolute -top-1 right-0 text-sm font-bold" style={{ color: C.leafDark }}>
      +{amount} 🪙
    </span>
  );
}

// ---------- MAIN APP ----------
function MoneyQuest() {
  const [screen, setScreen] = useState("home");
  const [coins, setCoins] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [completed, setCompleted] = useState([]);
  const [levelIdx, setLevelIdx] = useState(0);
  const [qIdx, setQIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [levelCoins, setLevelCoins] = useState(0);
  const [interestEarned, setInterestEarned] = useState(0);
  const [burst, setBurst] = useState({ amount: 0, key: 0 });

  const level = LEVELS[levelIdx];

  const addCoins = (n) => {
    setCoins((c) => c + n);
    setLevelCoins((c) => c + n);
    setBurst((b) => ({ amount: n, key: b.key + 1 }));
  };

  const startLevel = (i) => {
    setLevelIdx(i);
    setQIdx(0);
    setPicked(null);
    setLevelCoins(0);
    setScreen("lesson");
  };

  const pick = (i) => {
    if (picked !== null) return;
    setPicked(i);
    const right = i === level.questions[qIdx].correct;
    if (right) {
      const bonus = streak + 1 >= 3 ? STREAK_BONUS : 0;
      addCoins(COIN_CORRECT + bonus);
      setStreak((s) => {
        const ns = s + 1;
        setBestStreak((b) => Math.max(b, ns));
        return ns;
      });
    } else {
      addCoins(COIN_LEARN);
      setStreak(0);
    }
  };

  const next = () => {
    if (qIdx + 1 < level.questions.length) {
      setQIdx(qIdx + 1);
      setPicked(null);
    } else {
      // level complete → interest time (the lesson IS the mechanic)
      const interest = Math.max(1, Math.round(coins * 0.1));
      setInterestEarned(interest);
      setCoins((c) => c + interest);
      const firstTime = !completed.includes(level.id);
      setCompleted((arr) => (arr.includes(level.id) ? arr : [...arr, level.id]));
      // seeds: reward finishing a level (first time only), scaled by how well they did
      if (firstTime) {
        const seedsEarned = 10 + Math.round(levelCoins / 5); // base 10 + bonus for doing well
        awardSeeds(seedsEarned, "Finished a Money Quest level");
        // big bonus for completing the whole game
        if (completed.length + 1 === LEVELS.length) {
          awardSeeds(50, "Completed all of Money Quest!");
        }
      }
      setScreen("interest");
    }
  };

  const allDone = completed.length === LEVELS.length;

  const resetGame = () => {
    setCoins(0); setStreak(0); setBestStreak(0); setCompleted([]);
    setLevelIdx(0); setQIdx(0); setPicked(null); setScreen("home");
  };

  // ---------- SCREENS ----------
  const Header = () => (
    <div className="sticky top-0 z-10" style={{ background: C.sky }}>
      <Awning />
      <div className="flex items-center justify-between px-4 py-2 max-w-md mx-auto">
        <button onClick={() => setScreen(screen === "home" ? "home" : "map")} className="mq-display text-lg font-bold" style={{ color: C.ink }}>
          🍋 Money Quest
        </button>
        <div className="flex items-center gap-3">
          <div className="relative flex items-center gap-1 px-3 py-1 rounded-full" style={{ background: "#FFF3CF", border: `2px solid ${C.sunny}` }}>
            <span aria-hidden>🪙</span>
            <span className="mq-display font-bold" style={{ color: C.ink }}>{coins}</span>
            <CoinBurst amount={burst.amount} burstKey={burst.key} />
          </div>
          <div className="flex items-center gap-1 px-3 py-1 rounded-full" style={{ background: streak >= 3 ? "#FFE2E2" : "#EEF4FB", border: `2px solid ${streak >= 3 ? C.berry : C.line}` }}>
            <span aria-hidden>🔥</span>
            <span className="mq-display font-bold" style={{ color: C.ink }}>{streak}</span>
          </div>
        </div>
      </div>
    </div>
  );

  const Home = () => (
    <div className="mq-pop max-w-md mx-auto px-5 pt-10 pb-16 text-center">
      <div className="text-6xl mb-3 mq-wiggle inline-block">🍋</div>
      <h1 className="mq-display text-4xl font-bold mb-2" style={{ color: C.ink }}>Money Quest</h1>
      <p className="text-base mb-1 font-bold" style={{ color: C.inkSoft }}>Run your own lemonade-stand fortune.</p>
      <p className="text-sm mb-8" style={{ color: C.inkSoft }}>
        Answer money challenges, earn coins, and watch your jar grow interest — for real, inside the game.
      </p>
      <div className="rounded-2xl p-4 mb-8 text-left" style={{ background: C.card, border: `2px solid ${C.line}` }}>
        <p className="mq-display font-bold mb-2" style={{ color: C.ink }}>How it works</p>
        <p className="text-sm mb-1" style={{ color: C.inkSoft }}>🪙 Correct answers earn 10 coins. Wrong ones still earn 3 — learning pays.</p>
        <p className="text-sm mb-1" style={{ color: C.inkSoft }}>🔥 A 3+ streak adds bonus coins.</p>
        <p className="text-sm" style={{ color: C.inkSoft }}>🌱 Finish a level and your whole jar earns 10% interest. That's compounding!</p>
      </div>
      <button
        onClick={() => setScreen("map")}
        className="mq-display w-full py-4 rounded-2xl text-xl font-bold text-white"
        style={{ background: C.leaf, boxShadow: `0 4px 0 ${C.leafDark}` }}
      >
        Start the Quest
      </button>
    </div>
  );

  const Map = () => (
    <div className="mq-pop max-w-md mx-auto px-5 pt-6 pb-16">
      <div className="flex items-end justify-between mb-5">
        <div>
          <h2 className="mq-display text-2xl font-bold" style={{ color: C.ink }}>Your Quest Map</h2>
          <p className="text-sm" style={{ color: C.inkSoft }}>{completed.length} of {LEVELS.length} levels complete</p>
        </div>
        <Jar coins={coins} />
      </div>
      {allDone && (
        <button onClick={() => setScreen("done")} className="mq-display w-full mb-4 py-3 rounded-2xl font-bold text-white" style={{ background: C.sunnyDark, boxShadow: `0 4px 0 #A87C0A` }}>
          🏆 See your final results
        </button>
      )}
      <div className="flex flex-col gap-3">
        {LEVELS.map((lv, i) => {
          const done = completed.includes(lv.id);
          const locked = i > 0 && !completed.includes(LEVELS[i - 1].id);
          return (
            <button
              key={lv.id}
              disabled={locked}
              onClick={() => startLevel(i)}
              className="flex items-center gap-4 p-4 rounded-2xl text-left"
              style={{
                background: locked ? "#F2F6FB" : C.card,
                border: `2px solid ${done ? C.leaf : C.line}`,
                opacity: locked ? 0.55 : 1,
                boxShadow: locked ? "none" : "0 2px 0 " + C.line,
              }}
            >
              <span className="text-3xl" aria-hidden>{locked ? "🔒" : lv.emoji}</span>
              <span className="flex-1">
                <span className="mq-display block font-bold" style={{ color: C.ink }}>
                  Level {i + 1}: {lv.title}
                </span>
                <span className="text-sm" style={{ color: C.inkSoft }}>{lv.tag}</span>
              </span>
              {done && <span className="mq-display text-xs font-bold px-2 py-1 rounded-full" style={{ background: "#E2F7EC", color: C.leafDark }}>✓ {lv.badge}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );

  const Lesson = () => (
    <div className="mq-pop max-w-md mx-auto px-5 pt-6 pb-16">
      <p className="mq-display text-sm font-bold mb-1" style={{ color: C.inkSoft }}>Level {levelIdx + 1}</p>
      <h2 className="mq-display text-3xl font-bold mb-4" style={{ color: C.ink }}>{level.emoji} {level.title}</h2>
      <div className="rounded-2xl p-5 mb-6" style={{ background: C.card, border: `2px solid ${C.line}` }}>
        {level.lesson.map((p, i) => (
          <p key={i} className="text-base mb-3 last:mb-0 font-bold" style={{ color: C.ink, lineHeight: 1.55 }}>{p}</p>
        ))}
      </div>
      <button
        onClick={() => setScreen("quiz")}
        className="mq-display w-full py-4 rounded-2xl text-lg font-bold text-white"
        style={{ background: C.leaf, boxShadow: `0 4px 0 ${C.leafDark}` }}
      >
        I'm ready — quiz me!
      </button>
    </div>
  );

  const Quiz = () => {
    const question = level.questions[qIdx];
    const answered = picked !== null;
    const right = answered && picked === question.correct;
    return (
      <div className="mq-pop max-w-md mx-auto px-5 pt-6 pb-16">
        <div className="flex items-center justify-between mb-3">
          <p className="mq-display text-sm font-bold" style={{ color: C.inkSoft }}>
            {level.emoji} {level.title} · Question {qIdx + 1}/{level.questions.length}
          </p>
        </div>
        <div className="flex gap-1 mb-5" role="progressbar" aria-valuenow={qIdx + 1} aria-valuemax={level.questions.length}>
          {level.questions.map((_, i) => (
            <div key={i} className="flex-1 rounded-full" style={{ height: 6, background: i <= qIdx ? C.sunny : C.line }} />
          ))}
        </div>
        <h2 className="mq-display text-xl font-bold mb-5" style={{ color: C.ink, lineHeight: 1.35 }}>{question.q}</h2>
        <div className="flex flex-col gap-3 mb-5">
          {question.options.map((opt, i) => {
            let bg = C.card, border = C.line, color = C.ink;
            if (answered && i === question.correct) { bg = "#E2F7EC"; border = C.leaf; color = C.leafDark; }
            else if (answered && i === picked && !right) { bg = "#FFE9E9"; border = C.berry; color = "#B43B3B"; }
            return (
              <button
                key={i}
                onClick={() => pick(i)}
                disabled={answered}
                className="p-4 rounded-2xl text-left font-bold"
                style={{ background: bg, border: `2px solid ${border}`, color, boxShadow: answered ? "none" : `0 2px 0 ${C.line}` }}
              >
                {opt}
              </button>
            );
          })}
        </div>
        {answered && (
          <div className="mq-pop rounded-2xl p-4 mb-5" style={{ background: right ? "#E2F7EC" : "#FFF3CF", border: `2px solid ${right ? C.leaf : C.sunny}` }}>
            <p className="mq-display font-bold mb-1" style={{ color: C.ink }}>
              {right ? (streak >= 3 ? `Correct! 🔥 Streak bonus! +${COIN_CORRECT + STREAK_BONUS} coins` : `Correct! +${COIN_CORRECT} coins`) : `Not quite — but +${COIN_LEARN} coins for learning`}
            </p>
            <p className="text-sm font-bold" style={{ color: C.inkSoft, lineHeight: 1.5 }}>{question.explain}</p>
          </div>
        )}
        {answered && (
          <button
            onClick={next}
            className="mq-display w-full py-4 rounded-2xl text-lg font-bold text-white"
            style={{ background: C.leaf, boxShadow: `0 4px 0 ${C.leafDark}` }}
          >
            {qIdx + 1 < level.questions.length ? "Next question" : "Finish level"}
          </button>
        )}
      </div>
    );
  };

  const Interest = () => (
    <div className="mq-pop max-w-md mx-auto px-5 pt-10 pb-16 text-center">
      <div className="mq-sparkle text-5xl mb-2">✨</div>
      <h2 className="mq-display text-3xl font-bold mb-2" style={{ color: C.ink }}>Interest Day!</h2>
      <p className="text-base font-bold mb-6" style={{ color: C.inkSoft }}>
        Level complete! While you played, your jar earned <span style={{ color: C.leafDark }}>10% interest</span>.
      </p>
      <div className="flex justify-center mb-4"><Jar coins={coins} /></div>
      <div className="rounded-2xl p-5 mb-3" style={{ background: C.card, border: `2px solid ${C.leaf}` }}>
        <p className="mq-display text-lg font-bold" style={{ color: C.ink }}>
          Quiz coins: +{levelCoins} 🪙
        </p>
        <p className="mq-display text-lg font-bold" style={{ color: C.leafDark }}>
          Interest: +{interestEarned} 🪙 — earned by doing nothing!
        </p>
        <p className="text-sm font-bold mt-2" style={{ color: C.inkSoft }}>
          That's compound interest. The bigger your jar gets, the bigger every Interest Day becomes. This is exactly how real savings work.
        </p>
      </div>
      <p className="mq-display text-sm font-bold mb-6" style={{ color: C.inkSoft }}>🏅 Badge earned: {level.badge}</p>
      <button
        onClick={() => setScreen(allDone ? "done" : "map")}
        className="mq-display w-full py-4 rounded-2xl text-lg font-bold text-white"
        style={{ background: C.leaf, boxShadow: `0 4px 0 ${C.leafDark}` }}
      >
        {allDone ? "See final results" : "Back to the map"}
      </button>
    </div>
  );

  const Done = () => (
    <div className="mq-pop max-w-md mx-auto px-5 pt-10 pb-16 text-center">
      <div className="text-6xl mb-3">🏆</div>
      <h2 className="mq-display text-3xl font-bold mb-2" style={{ color: C.ink }}>Quest Complete!</h2>
      <p className="text-base font-bold mb-6" style={{ color: C.inkSoft }}>You're officially money-smarter than most adults. Seriously.</p>
      <div className="rounded-2xl p-5 mb-4 text-left" style={{ background: C.card, border: `2px solid ${C.sunny}` }}>
        <p className="mq-display font-bold mb-2" style={{ color: C.ink }}>Final jar: {coins} 🪙 · Best streak: {bestStreak} 🔥</p>
        {LEVELS.map((lv) => (
          <p key={lv.id} className="text-sm font-bold mb-1" style={{ color: C.inkSoft }}>
            {lv.emoji} {lv.title} → 🏅 {lv.badge}
          </p>
        ))}
      </div>
      <div className="rounded-2xl p-5 mb-6 text-left" style={{ background: "#E2F7EC", border: `2px solid ${C.leaf}` }}>
        <p className="mq-display font-bold mb-2" style={{ color: C.leafDark }}>Take this with you:</p>
        <p className="text-sm font-bold" style={{ color: C.ink, lineHeight: 1.6 }}>
          Earn with your skills. Needs before wants. Give every dollar a plan. Start saving early — time is your superpower. Borrow carefully. And if it sounds too good to be true… it is. 🛡️
        </p>
      </div>
      <button onClick={resetGame} className="mq-display w-full py-4 rounded-2xl text-lg font-bold text-white" style={{ background: C.leaf, boxShadow: `0 4px 0 ${C.leafDark}` }}>
        Play again
      </button>
    </div>
  );

  return (
    <div className="mq-root min-h-screen" style={{ background: C.sky }}>
      <style>{css}</style>
      <Header />
      {screen === "home" && <Home />}
      {screen === "map" && <Map />}
      {screen === "lesson" && <Lesson />}
      {screen === "quiz" && <Quiz />}
      {screen === "interest" && <Interest />}
      {screen === "done" && <Done />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MoneyQuest />);
  </script>
</body>
</html>
