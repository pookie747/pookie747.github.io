// ----------------------- HELPERS -----------------------
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function moodFor(trust) {
  if (trust >= 75) return { face: "😊", label: "Connected" };
  if (trust >= 55) return { face: "🙂", label: "Open" };
  if (trust >= 40) return { face: "😐", label: "Listening" };
  if (trust >= 25) return { face: "😕", label: "Tense" };
  return { face: "😞", label: "Hurt" };
}

function ratingFor(trust, greats) {
  if (trust >= 80 && greats >= 2)
    return {
      stars: 3,
      title: "Conversation Champion",
      note: "You said the hard thing, said it well, and left the relationship stronger than you found it.",
    };
  if (trust >= 60)
    return {
      stars: 2,
      title: "Solid Talker",
      note: "You got through it honestly. A few choices could land softer — replay and try the other paths!",
    };
  return {
    stars: 1,
    title: "Brave Beginner",
    note: "Hard talks take practice — and you showed up, which is step one. Try again and watch the meter climb.",
  };
}

// ----------------------- UI PIECES -----------------------
function TrustMeter({ trust, adult }) {
  const mood = moodFor(trust);
  const color = trust >= 55 ? C.mint : trust >= 40 ? C.amber : C.rose;
  return (
    <div
      className="flex items-center gap-3 rounded-2xl px-4 py-3"
      style={{ background: C.card, border: `2px solid ${C.ink}` }}
    >
      <div
        className="flex h-12 w-12 items-center justify-center rounded-full text-2xl"
        style={{ background: C.paper, border: `2px solid ${C.ink}` }}
        aria-hidden="true"
      >
        {mood.face}
      </div>
      <div className="flex-1">
        <div className="flex items-baseline justify-between">
          <span className="text-xs font-bold uppercase tracking-wider" style={{ color: C.inkSoft }}>
            {adult} feels
          </span>
          <span className="text-sm font-extrabold" style={{ color }}>

          </span>
        </div>
        <div

          style={{ background: C.paper, border: `1.5px solid ${C.ink}` }}
          role="meter"
          aria-valuenow={trust}
          aria-valuemin={0}
          aria-valuemax={100}
          aria-label="Trust meter"
        >
          <div
            className="h-full rounded-full transition-all duration-500"
            style={{ width: `${trust}%`, background: color }}
          />
        </div>
      </div>
    </div>
  );
}

function Bubble({ who, emoji, children }) {
  const isYou = who === "you";
  return (
    <div className={`flex items-end gap-2 ${isYou ? "flex-row-reverse" : ""}`}>

        className="flex h-10 w-10 shrink-0 items-center justify-center rounded-full text-xl"
        style={{ background: C.card, border: `2px solid ${C.ink}` }}
        aria-hidden="true"
      >
        {isYou ? "🧒" : emoji}
      </div>
      <div
        className="relative max-w-[85%] rounded-2xl px-4 py-3 text-[15px] leading-snug"
        style={{
          background: isYou ? C.bubbleYou : C.bubbleNPC,
          color: isYou ? "#FFFFFF" : C.ink,
          border: `2px solid ${C.ink}`,
          borderBottomLeftRadius: isYou ? 16 : 4,
          borderBottomRightRadius: isYou ? 4 : 16,
        }}

        {children}

    </div>
  );
}

      <TrustMeter trust={trust} adult={scenario.adult} />

      {skills.length > 0 && (
        <div className="w-full rounded-2xl p-4" style={{ background: C.card, border: `2px solid ${C.ink}` }}>
          <div className="mb-2 text-xs font-bold uppercase tracking-wider" style={{ color: C.inkSoft }}>
            Skills you used
          </div>
          <div className="flex flex-wrap justify-center gap-2">
            {skills.map((s) => (
              <span
                key={s}
                className="rounded-full px-3 py-1 text-xs font-bold"
                style={{ background: C.mint, color: "#fff", border: `1.5px solid ${C.ink}` }}
              >
                {s}
              </span>
            ))}
          </div>
        </div>
      )}

      <div className="flex gap-3">
        <button
          onClick={onReplay}
          className="rounded-xl px-5 py-2.5 text-sm font-extrabold focus:outline-none focus-visible:ring-4"
          style={{ background: C.coral, color: "#fff", border: `2px solid ${C.ink}`, boxShadow: `3px 3px 0 ${C.ink}` }}
        >
          Replay scenario
        </button>
        <button
          onClick={onHome}
          className="rounded-xl px-5 py-2.5 text-sm font-extrabold focus:outline-none focus-visible:ring-4"
          style={{ background: C.card, color: C.ink, border: `2px solid ${C.ink}`, boxShadow: `3px 3px 0 ${C.ink}` }}
        >
          All scenarios
        </button>
      </div>
    </div>
  );
}

// ----------------------- MAIN APP -----------------------
function TalkQuest() {
  const [screen, setScreen] = useState("home"); // home | intro | play | end
  const [scenarioId, setScenarioId] = useState(null);
  const [turnIdx, setTurnIdx] = useState(0);
  const [trust, setTrust] = useState(50);
  const [picked, setPicked] = useState(null); // the choice just made
  const [history, setHistory] = useState([]); // { npc, you }
  const [greats, setGreats] = useState(0);
  const [skills, setSkills] = useState([]);
  const [completed, setCompleted] = useState({});
  const [runId, setRunId] = useState(0);

  const scenario = SCENARIOS.find((s) => s.id === scenarioId) || null;

  // Shuffle choice order per turn so the "best" answer isn't always last
  const shuffledTurns = useMemo(() => {
    if (!scenario) return [];
    return scenario.turns.map((t) => ({ ...t, choices: shuffle(t.choices) }));
  }, [scenario, runId]);

  function startScenario(id) {
    setScenarioId(id);
    setTurnIdx(0);
    setTrust(50);
    setPicked(null);
    setHistory([]);
    setGreats(0);
    setSkills([]);
    setRunId((r) => r + 1);
    setScreen("intro");
  }

  function choose(choice) {
    const newTrust = Math.max(0, Math.min(100, trust + choice.delta));
    setTrust(newTrust);
    setPicked(choice);
    if (choice.quality === 2) {
      setGreats((g) => g + 1);
      setSkills((s) => (s.includes(choice.skill) ? s : [...s, choice.skill]));
    }
  }

  function nextTurn() {
    const turn = shuffledTurns[turnIdx];
    setHistory((h) => [...h, { npc: turn.npc, you: picked.text }]);
    setPicked(null);
    if (turnIdx + 1 < shuffledTurns.length) {
      setTurnIdx(turnIdx + 1);
    } else {
      const r = ratingFor(trust, greats);
      const prevStars = completed[scenarioId] || 0;
      // seeds: reward stars gained this run (first clear, or improvement on a replay)
      const starsGained = Math.max(0, r.stars - prevStars);
      if (starsGained > 0) {
        awardSeeds(starsGained * 15, "Did well in TalkQuest");
      }
      setCompleted((c) => ({ ...c, [scenarioId]: Math.max(c[scenarioId] || 0, r.stars) }));
      setScreen("end");
    }
  }

  const turn = shuffledTurns[turnIdx];

  return (
    <div className="min-h-screen w-full px-4 py-6" style={{ background: C.paper, ...ROUNDED }}>
      <div className="mx-auto flex max-w-xl flex-col gap-4">
        {screen !== "home" && scenario && (
          <button
            onClick={() => setScreen("home")}
            className="self-start rounded-full px-3 py-1 text-xs font-bold focus:outline-none focus-visible:ring-4"
            style={{ background: C.card, color: C.ink, border: `1.5px solid ${C.ink}` }}
          >
            ← All scenarios
          </button>
        )}

        {screen === "home" && <HomeScreen onPick={startScenario} completed={completed} />}

        {screen === "intro" && scenario && (
          <div className="flex flex-col gap-4">
            <div
              className="rounded-2xl p-5"
              style={{ background: C.card, border: `2px solid ${C.ink}`, boxShadow: `4px 4px 0 ${C.ink}` }}
            >
              <div className="mb-1 flex items-center gap-2">
                <span className="text-3xl" aria-hidden="true">{scenario.emoji}</span>
                <h2 className="text-xl font-extrabold" style={{ color: C.ink }}>
                  {scenario.title}
                </h2>
              </div>
              <p className="text-[15px]" style={{ color: C.ink }}>{scenario.setup}</p>
              <p className="mt-3 rounded-xl px-3 py-2 text-sm font-bold" style={{ background: C.paper, color: C.ink, border: `1.5px dashed ${C.ink}` }}>
                🎯 Your goal: {scenario.goal}
              </p>
            </div>
            <button
              onClick={() => setScreen("play")}
              className="rounded-xl px-5 py-3 text-base font-extrabold focus:outline-none focus-visible:ring-4"
              style={{ background: C.coral, color: "#fff", border: `2px solid ${C.ink}`, boxShadow: `3px 3px 0 ${C.ink}` }}
            >
              Start the conversation
            </button>
          </div>
        )}

        {screen === "play" && scenario && turn && (
          <div className="flex flex-col gap-4">
            <TrustMeter trust={trust} adult={scenario.adult} />

            <div className="flex flex-col gap-3">
              {history.slice(-1).map((h, i) => (
                <div key={i} className="flex flex-col gap-3 opacity-60">
                  <Bubble who="npc" emoji={scenario.emoji}>{h.npc}</Bubble>
                  <Bubble who="you">{h.you}</Bubble>
                </div>
              ))}
              <Bubble who="npc" emoji={scenario.emoji}>{turn.npc}</Bubble>
              {picked && <Bubble who="you">{picked.text}</Bubble>}
            </div>

            {!picked && (
              <div className="flex flex-col gap-2">
                <div className="text-xs font-bold uppercase tracking-wider" style={{ color: C.inkSoft }}>
                  What do you say?
                </div>
                {turn.choices.map((c, i) => (
                  <button
                    key={i}
                    onClick={() => choose(c)}
                    className="rounded-2xl px-4 py-3 text-left text-[15px] font-semibold leading-snug transition-transform hover:-translate-y-0.5 focus:outline-none focus-visible:ring-4"
                    style={{ background: C.card, color: C.ink, border: `2px solid ${C.ink}`, boxShadow: `2px 2px 0 ${C.ink}` }}
                  >
                    “{c.text}”
                  </button>
                ))}
              </div>
            )}

            {picked && (
              <div className="flex flex-col gap-3">
                <div
                  className="rounded-2xl p-4"
                  style={{ background: C.card, border: `2px solid ${QUALITY_STYLE[picked.quality].color}`, boxShadow: `3px 3px 0 ${QUALITY_STYLE[picked.quality].color}` }}
                >
                  <div className="mb-1 flex items-center justify-between">
                    <span className="text-sm font-extrabold" style={{ color: QUALITY_STYLE[picked.quality].color }}>
                      {QUALITY_STYLE[picked.quality].icon} {QUALITY_STYLE[picked.quality].tag}
                    </span>
                    <span className="text-xs font-bold" style={{ color: picked.delta >= 0 ? C.mint : C.rose }}>
                      {picked.delta >= 0 ? `+${picked.delta}` : picked.delta} trust
                    </span>
                  </div>
                  <p className="text-sm leading-relaxed" style={{ color: C.ink }}>
                    {picked.feedback}
                  </p>
                  <p className="mt-2 text-xs font-bold uppercase tracking-wider" style={{ color: C.inkSoft }}>
                    Skill: {picked.skill}
                  </p>
                </div>
                <button
                  onClick={nextTurn}
                  className="self-end rounded-xl px-5 py-2.5 text-sm font-extrabold focus:outline-none focus-visible:ring-4"
                  style={{ background: C.ink, color: "#fff", border: `2px solid ${C.ink}`, boxShadow: `3px 3px 0 ${C.coral}` }}
                >
                  {turnIdx + 1 < shuffledTurns.length ? "Continue →" : "See how it went →"}
                </button>
              </div>
            )}
          </div>
        )}

        {screen === "end" && scenario && (
          <EndScreen
            scenario={scenario}
            trust={trust}
            greats={greats}
            skills={skills}
            onReplay={() => startScenario(scenario.id)}
            onHome={() => setScreen("home")}
          />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TalkQuest />);
  </script>
</body>
</html>
